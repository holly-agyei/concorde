<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Uber · Your trip</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/static/rider.css" />
</head>
<body>
  <div class="phone">
    <div class="phone__notch"></div>
    <div class="phone__statusbar">
      <span>9:41</span>
      <span class="phone__sig">●●●●● 5G</span>
    </div>

    <header class="rider-top">
      <button class="iconbtn" aria-label="Menu">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div class="rider-top__title">Your trip</div>
      <button class="iconbtn" aria-label="Safety">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </button>
    </header>

    <div class="status-pill" id="statusPill">
      <span class="status-pill__dot"></span>
      <span id="statusText">Your driver is on the way</span>
    </div>

    <div id="map" class="rider-map"></div>

    <section class="card">
      <div class="card__eta">
        <div class="card__eta-num" id="etaNum">12</div>
        <div class="card__eta-unit">min away</div>
      </div>
      <div class="card__driver">
        <div class="card__driver-avatar" id="driverAvatar">D</div>
        <div class="card__driver-info">
          <div class="card__driver-name" id="driverName">David</div>
          <div class="card__driver-meta" id="driverMeta">Toyota Camry · 7ABC123</div>
          <div class="card__rating">★ <span id="driverRating">4.92</span></div>
        </div>
        <div class="card__actions">
          <a class="iconbtn iconbtn--circle" href="/user" title="Message" aria-label="Message">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.5 8.5 0 0 1 7.6-12.3 8.5 8.5 0 0 1 8.5 8.5z"/></svg>
          </a>
          <a class="iconbtn iconbtn--circle iconbtn--green" href="/user" title="Call" aria-label="Call">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.6a2 2 0 0 1-.4 2.1L8 9.7a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.8.3 1.7.5 2.6.6a2 2 0 0 1 1.7 2.3z"/></svg>
          </a>
        </div>
      </div>

      <div class="trip-row">
        <div class="trip-row__icon"><span class="dot dot--blue"></span></div>
        <div class="trip-row__text">
          <div class="trip-row__label">Pickup</div>
          <div class="trip-row__value" id="pickupLabel">450 San Bruno Avenue W</div>
        </div>
      </div>
      <div class="trip-row">
        <div class="trip-row__icon"><span class="dot dot--green"></span></div>
        <div class="trip-row__text">
          <div class="trip-row__label">Drop-off</div>
          <div class="trip-row__value" id="dropLabel">SFO Terminal 2</div>
          <div class="trip-row__sub" id="dropDoor">Door 2</div>
        </div>
      </div>

      <div class="concorde" id="concordeBanner" hidden>
        <div class="concorde__dot"></div>
        <div class="concorde__text">Concorde is handling this for you…</div>
      </div>

      <button class="cancel">Cancel trip</button>
    </section>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/uber-map.js"></script>
  <script src="/static/rider.js"></script>
</body>
</html>
